<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="conteiner">
        <h1>Faça seu</h1>
        <form>
            <h1>Login</h1>
                <label for="email">Email:</label>
                <input type="email" id="email" placeholder="Faça seu login...">
                <label for="senha">Senha:</label>
                <input type="password" id="senha" placeholder="Coloque sua senha">
                <button id="btnLogin">Entrar</button>
        </form>
        <p class="inserir">Insira os dados</p>
        <p class="inserir"><a href="cadastro.html">Cadastro</a></p>
    </div>
</body>
<script src="script.js"></script>
</html>
