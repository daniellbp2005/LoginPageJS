<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="conteiner">
        <h1>Faça seu</h1>
        <form>
            <h1>Cadastro</h1>
            <label for="email">Nome:</label>
            <input type="text" id="inputNome" placeholder="Coloque seu Nome...">
            <label for="email">Email:</label>
            <input type="email" id="inputLoginCad" placeholder="Faça seu Cadastro...">
            <label for="senha">Senha:</label>
            <input type="password" id="inputSenhaCad" placeholder="Coloque sua senha">
            <button id="btnCad">Entrar</button>
        </form>
        <p class="textoCad">Insira os dados</p>
        <p class="textoCad"><a href="index.html">Login</a></p>
    </div>
</body>
<script src="script.js"></script>

</html>
